<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Summarizer Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            color: #f8fafc;
            min-height: 100vh;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 8px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05); 
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2); 
            border-radius: 4px;
        }
    </style>
</head>
<body class="flex items-center justify-center p-6 font-sans">

    <div class="glass-panel w-full max-w-3xl rounded-2xl p-8 transition-all">
        <div class="text-center mb-8">
            <h1 class="text-4xl font-extrabold tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500 mb-2">
                AI Summarizer Pro
            </h1>
            <p class="text-slate-400 text-sm">Upload text and images for an intelligent summary.</p>
        </div>

        <div class="space-y-6">
            <div>
                <label class="block text-sm font-medium text-slate-300 mb-2">Your Text</label>
                <textarea id="textInput" rows="5" class="w-full bg-slate-900/50 border border-slate-700 rounded-xl p-4 text-slate-200 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent custom-scrollbar transition-all" placeholder="Paste the text you want to summarize here..."></textarea>
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-300 mb-2">Attach Image (Optional)</label>
                <input type="file" id="imageInput" accept="image/*" class="block w-full text-sm text-slate-400
                    file:mr-4 file:py-2.5 file:px-4
                    file:rounded-lg file:border-0
                    file:text-sm file:font-semibold
                    file:bg-purple-600 file:text-white
                    hover:file:bg-purple-700
                    cursor-pointer transition-all">
            </div>

            <button id="summarizeBtn" onclick="generateSummary()" class="w-full py-3.5 px-4 bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-500 hover:to-purple-500 text-white font-bold rounded-xl shadow-lg transform transition-all active:scale-95 flex justify-center items-center gap-2">
                <svg id="loadingSpinner" class="animate-spin h-5 w-5 hidden text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                <span id="btnText">Summarize Now</span>
            </button>

            <div id="outputContainer" class="hidden mt-8 pt-6 border-t border-slate-700/50">
                <h3 class="text-lg font-semibold text-slate-200 mb-3">Summary Result:</h3>
                <div id="summaryOutput" class="bg-slate-900/50 rounded-xl p-5 border border-slate-700/50 text-slate-300 leading-relaxed custom-scrollbar max-h-64 overflow-y-auto">
                    </div>
            </div>
        </div>
    </div>

    <script>
        // এখানে আপনার OpenRouter API Key দিন
        const OPENROUTER_API_KEY = "YOUR_OPENROUTER_API_KEY_HERE"; 
        
        async function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result);
                reader.onerror = error => reject(error);
            });
        }

        async function generateSummary() {
            const textInput = document.getElementById('textInput').value.trim();
            const imageFile = document.getElementById('imageInput').files[0];
            const summarizeBtn = document.getElementById('summarizeBtn');
            const loadingSpinner = document.getElementById('loadingSpinner');
            const btnText = document.getElementById('btnText');
            const outputContainer = document.getElementById('outputContainer');
            const summaryOutput = document.getElementById('summaryOutput');

            if (!textInput && !imageFile) {
                alert("Please enter some text or upload an image to summarize.");
                return;
            }

            // UI State: Loading
            summarizeBtn.disabled = true;
            loadingSpinner.classList.remove('hidden');
            btnText.innerText = "Processing...";
            outputContainer.classList.add('hidden');
            summaryOutput.innerHTML = "";

            try {
                // Prepare message content array
                let contentArray = [];

                if (textInput) {
                    contentArray.push({
                        "type": "text",
                        "text": `Please provide a professional and concise summary of the following content: \n\n${textInput}`
                    });
                } else {
                    contentArray.push({
                        "type": "text",
                        "text": "Please provide a detailed summary of what is in this image."
                    });
                }

                if (imageFile) {
                    const base64Image = await fileToBase64(imageFile);
                    contentArray.push({
                        "type": "image_url",
                        "image_url": {
                            "url": base64Image
                        }
                    });
                }

                // API Call to OpenRouter
                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${OPENROUTER_API_KEY}`,
                        "HTTP-Referer": window.location.href, // Recommended for OpenRouter
                        "X-Title": "Premium Summarizer App", // Recommended for OpenRouter
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        "model": "google/gemini-1.5-flash", // Vision Supported Model
                        "messages": [
                            {
                                "role": "user",
                                "content": contentArray
                            }
                        ]
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error?.message || "Failed to fetch summary.");
                }

                // Show Output
                summaryOutput.innerText = data.choices[0].message.content;
                outputContainer.classList.remove('hidden');

            } catch (error) {
                console.error("Error:", error);
                summaryOutput.innerHTML = `<span class="text-red-400">Error: ${error.message}</span>`;
                outputContainer.classList.remove('hidden');
            } finally {
                // UI State: Reset
                summarizeBtn.disabled = false;
                loadingSpinner.classList.add('hidden');
                btnText.innerText = "Summarize Now";
            }
        }
    </script>
</body>
</html>
